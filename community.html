<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherPort — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/community.css">
<style>
  .coming-shell {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 24px 80px;
  }

  .coming-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 20%, rgba(184,160,88,0.10), transparent 32%),
      linear-gradient(to bottom, rgba(255,255,255,0.015), transparent 35%);
    pointer-events: none;
  }

  .coming-sea {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.9;
  }

  .coming-card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 860px;
    text-align: center;
    padding: 56px 36px 44px;
    border: 1px solid var(--border);
    background: rgba(10, 10, 10, 0.72);
    box-shadow: 0 18px 48px rgba(0,0,0,0.28);
    backdrop-filter: blur(6px);
  }

  .coming-label {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.6px;
    text-transform: uppercase;
    color: var(--gold-muted);
    margin-bottom: 18px;
  }

  .coming-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(38px, 7vw, 76px);
    line-height: 1.02;
    color: var(--text);
    margin: 0;
  }

  .coming-title span {
    color: var(--gold);
  }

  .coming-sub {
    max-width: 680px;
    margin: 22px auto 0;
    font-size: 20px;
    line-height: 1.75;
    color: var(--text-secondary);
  }

  .coming-note {
    margin-top: 26px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--gold-muted);
  }

  .coming-actions {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 34px;
  }

  .coming-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0 20px;
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    transition: 0.2s ease;
  }

  .coming-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .coming-btn.primary {
    background: var(--gold);
    color: #111;
    border-color: var(--gold);
    font-weight: 600;
  }

  .coming-btn.primary:hover {
    color: #111;
    filter: brightness(1.05);
  }

  .ship {
    position: absolute;
    color: rgba(184,160,88,0.34);
    z-index: 1;
  }

  .ship svg {
    display: block;
  }

  .ship-1 {
    left: 8%;
    bottom: 18%;
    transform: scale(0.8);
  }

  .ship-2 {
    right: 10%;
    bottom: 26%;
    transform: scale(1);
  }

  .ship-3 {
    left: 20%;
    top: 18%;
    transform: scale(0.6);
    opacity: 0.6;
  }

  .ship-4 {
    right: 18%;
    top: 16%;
    transform: scale(0.7);
    opacity: 0.55;
  }

  .sea-line {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 12%;
    height: 120px;
    z-index: 0;
    opacity: 0.32;
  }

  .coming-footer {
    margin-top: 26px;
    color: var(--text-muted);
    font-size: 14px;
  }

  @media (max-width: 720px) {
    .coming-card {
      padding: 42px 20px 34px;
    }

    .coming-sub {
      font-size: 17px;
    }

    .ship-1,
    .ship-2 {
      transform: scale(0.62);
    }

    .ship-3,
    .ship-4 {
      display: none;
    }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img src="assets/logo.jpg" class="nav-logo-img" alt="JC Labs R&D">
    <span class="nav-name">JC Laboratories</span>
  </a>
  <a href="index.html" class="nav-back">&larr; Back to Home</a>

  <div class="ship ship-1">

      <g fill="none" stroke="#b8a058" stroke-linecap="round" stroke-linejoin="round">
        <path d="M70 140 L110 165 L150 140" stroke-width="7"/>

        <path d="M110 65 L110 125" stroke-width="6"/>
        <path d="M110 65 L145 95 L110 115" stroke-width="6"/>

        <path d="M110 165 L110 180" stroke-width="4"/>
      </g>
    </svg>
  </div>

  <div class="ship ship-2">
    <svg width="140" height="140" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#b8a058" stroke-linecap="round" stroke-linejoin="round">
        <path d="M70 140 L110 165 L150 140" stroke-width="7"/>
        <path d="M80 125 L140 125" stroke-width="6"/>
        <path d="M110 65 L110 125" stroke-width="6"/>
        <path d="M110 65 L145 95 L110 115" stroke-width="6"/>
        <path d="M110 75 L80 105 L110 115" stroke-width="5"/>
        <path d="M110 165 L110 180" stroke-width="4"/>
      </g>
    </svg>
  </div>

  <div class="ship ship-3">
    <svg width="100" height="100" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#b8a058" stroke-linecap="round" stroke-linejoin="round">
        <path d="M70 140 L110 165 L150 140" stroke-width="7"/>
        <path d="M80 125 L140 125" stroke-width="6"/>
        <path d="M110 65 L110 125" stroke-width="6"/>
        <path d="M110 65 L145 95 L110 115" stroke-width="6"/>
      </g>
    </svg>
  </div>

  <div class="ship ship-4">
    <svg width="105" height="105" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#b8a058" stroke-linecap="round" stroke-linejoin="round">
        <path d="M70 140 L110 165 L150 140" stroke-width="7"/>
        <path d="M80 125 L140 125" stroke-width="6"/>
        <path d="M110 65 L110 125" stroke-width="6"/>
        <path d="M110 65 L145 95 L110 115" stroke-width="6"/>
      </g>
    </svg>
  </div>

  <div class="coming-card">
    <span class="coming-label">// cipherport</span>
    <h1 class="coming-title">Coming <span>Soon</span></h1>
    <p class="coming-sub">
      The public surface of Cryptaverse is approaching the harbor.
    </p>
    <div class="coming-note">
      billboard highway · public groups · much more
    </div>

    <div class="coming-actions">
      <a href="updates.html" class="coming-btn primary">Follow Updates</a>
      <a href="index.html" class="coming-btn">Back Home</a>
    </div>

    <div class="coming-footer">
      JC Laboratories · Independent security systems
    </div>
  </div>

</div>

</body>
</html>
